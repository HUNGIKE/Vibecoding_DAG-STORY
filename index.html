<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Graph POC</title>
  <style>
    body { margin: 0; background: #111827; color: #f3f4f6; font-family: Georgia, serif; line-height: 1.7; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }
    .card { background: #1f2937; border: 1px solid #374151; border-radius: 16px; padding: 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.25); }
    h1 { margin-top: 0; font-size: 30px; margin-bottom: 8px; }
    .meta { color: #cbd5e1; margin-bottom: 18px; font-size: 14px; }
    .story { font-size: 18px; margin-bottom: 22px; white-space: pre-line; min-height: 140px; }
    .choices { display: grid; gap: 12px; }
    button, select { font: inherit; }
    button { width: 100%; text-align: left; background: #374151; color: #f9fafb; border: 1px solid #4b5563; border-radius: 12px; padding: 14px 16px; font-size: 16px; cursor: pointer; }
    button:hover:not(:disabled) { background: #4b5563; }
    button:disabled { cursor: default; }
    .topbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .small-btn, .story-select { width: auto; background: #0f172a; color: #f9fafb; border: 1px solid #334155; border-radius: 10px; padding: 10px 14px; font-size: 14px; }
    .story-select { min-width: 260px; }
    .path { margin-top: 18px; color: #cbd5e1; font-size: 14px; word-break: break-word; }
    .title2 { font-size: 15px; color: #93c5fd; margin-bottom: 6px; margin-top: 18px; }
    .graph-wrap { margin-top: 12px; padding: 14px; background: #111827; border: 1px solid #374151; border-radius: 14px; overflow: auto; }
    #graphCanvas { display: block; margin: 0 auto; background: #0b1220; border-radius: 10px; }
    .status { margin-top: 18px; padding: 12px 14px; border: 1px solid #374151; border-radius: 12px; background: #0f172a; font-size: 13px; color: #cbd5e1; white-space: pre-line; }
    .status.ok { border-color: #14532d; color: #bbf7d0; }
    .status.error { border-color: #7f1d1d; color: #fecaca; }
    .end { margin-top: 18px; color: #fca5a5; font-weight: bold; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <select id="storySelector" class="story-select"></select>
        <button class="small-btn" id="restartBtn">重新開始</button>
        <button class="small-btn" id="backBtn">返回上一步</button>
      </div>
      <h1 id="storyTitle"></h1>
      <div class="meta" id="storySubtitle"></div>
      <div class="title2">目前劇情</div>
      <div class="story" id="storyText"></div>
      <div class="title2">可選行動</div>
      <div class="choices" id="choicesBox"></div>
      <div class="end" id="endText"></div>
      <div class="path" id="pathText"></div>
      <div class="title2">整體 graph 視圖</div>
      <div class="graph-wrap"><canvas id="graphCanvas" width="980" height="760"></canvas></div>
      <div class="title2">資料檢查</div>
      <div class="status" id="statusBox">尚未執行檢查</div>
    </div>
  </div>

  <script>
    function makeStory(prefix, title, subtitle, endingLabels) {
      const endNodes = [`${prefix}26`, `${prefix}27`, `${prefix}28`, `${prefix}29`, `${prefix}30`];
      const layers = [
        [`${prefix}1`],
        [`${prefix}2`, `${prefix}3`, `${prefix}4`],
        [`${prefix}5`, `${prefix}6`, `${prefix}7`, `${prefix}8`, `${prefix}9`],
        [`${prefix}10`, `${prefix}11`, `${prefix}12`, `${prefix}13`, `${prefix}14`, `${prefix}15`],
        [`${prefix}16`, `${prefix}17`, `${prefix}18`, `${prefix}19`, `${prefix}20`],
        [`${prefix}21`, `${prefix}22`, `${prefix}23`, `${prefix}24`, `${prefix}25`],
        endNodes
      ];

      return { title, subtitle, startNode: `${prefix}1`, endNodes, layers, nodes: [] };
    }

    const storyDetective = {
      title: "Fog Over Holborn",
      subtitle: "19th-century London · Detective Jack Harrow and his assistant Clara Vale",
      startNode: "N1",
      endNodes: ["N26", "N27", "N28", "N29", "N30"],
      layers: [["N1"], ["N2", "N3", "N4"], ["N5", "N6", "N7", "N8", "N9"], ["N10", "N11", "N12", "N13", "N14", "N15"], ["N16", "N17", "N18", "N19", "N20"], ["N21", "N22", "N23", "N24", "N25"], ["N26", "N27", "N28", "N29", "N30"]],
      nodes: [
        { id: "N1", text: `1891 年的 Holborn 被濃霧與煤煙壓得發沉。偵探 Jack Harrow 站在事務所窗邊，手裡夾著失蹤銀行職員 Edwin Mercer 的照片；Clara Vale 則在桌前攤開一封未寫完的信。信上最後一句寫著：『黑色帳本不該被任何人看見。』`, choices: [{ to: "N2", text: "讓 Jack 與 Clara 先檢查信件與私人物品" }, { to: "N3", text: "讓他們前往 Edwin 的住處調查" }, { to: "N4", text: "讓他們直接去銀行詢問同事" }] },
        { id: "N2", text: `Clara 發現信紙邊緣沾著煤灰，還有一絲上流社會香水味。Jack 判斷 Edwin 最近接觸的人不只是銀行同事。`, choices: [{ to: "N5", text: "追查香水來源" }, { to: "N6", text: "分析煤灰可能來自哪一區" }, { to: "N7", text: "檢查火車票與交通紀錄" }] },
        { id: "N3", text: `Edwin 的房間被翻得凌亂，床下藏著一只空文件袋，窗台上留有混著油污的泥痕。這不像普通竊盜，更像有人在找特定文件。`, choices: [{ to: "N6", text: "分析泥土與煤灰" }, { to: "N7", text: "追查 Edwin 最近的交通動線" }, { to: "N8", text: "詢問房東與鄰居" }] },
        { id: "N4", text: `銀行裡人人緊張。出納員透露 Edwin 曾與一名戴灰手套的紳士激烈爭執，內容似乎與保險箱裡的帳冊有關。`, choices: [{ to: "N7", text: "調閱 Edwin 的外出紀錄" }, { to: "N8", text: "盤問員工與守衛" }, { to: "N9", text: "調查灰手套紳士" }] },
        { id: "N5", text: `香味指向 Whitmore 夫人，一位常出入高級旅館的神秘寡婦。旅館女侍說她最近常與一名年輕男子密談。`, choices: [{ to: "N10", text: "追查 Whitmore 夫人的馬車去向" }, { to: "N11", text: "秘密調查她的社交與財務背景" }] },
        { id: "N6", text: `煤灰與泥土都指向城東倉庫區，那裡靠近鐵路與煤場，也常被用作私下交易地點。`, choices: [{ to: "N10", text: "立刻前往倉庫區" }, { to: "N11", text: "先查倉庫租用紀錄" }, { to: "N12", text: "在附近酒館打聽消息" }] },
        { id: "N7", text: `火車票與通勤紀錄都指向 Blackfriars 河岸。Clara 懷疑 Edwin 在夜裡與某人秘密交接。`, choices: [{ to: "N11", text: "調查河岸附近可疑場所" }, { to: "N12", text: "詢問河岸工人" }, { to: "N13", text: "夜裡埋伏觀察" }] },
        { id: "N8", text: `鄰居口供彼此矛盾：有人聽見女人哭聲，有人只看見兩個男人離開。Clara 認為有人刻意混淆時間線。`, choices: [{ to: "N12", text: "拆解矛盾證詞" }, { to: "N13", text: "重建失蹤當晚時間線" }, { to: "N14", text: "尋找可能出現的女人" }] },
        { id: "N9", text: `灰手套紳士名叫 Lionel Ashe，是航運公司的法律顧問，與多名議員和慈善董事都有往來。`, choices: [{ to: "N13", text: "監視 Lionel Ashe" }, { to: "N14", text: "調查他的私人關係" }, { to: "N15", text: "追查他經手的文件" }] },
        { id: "N10", text: `倉庫裡有破碎酒瓶、拖行痕和一枚刻著 E.M. 的帶血袖扣。Edwin 確實曾在這裡遇襲。`, choices: [{ to: "N16", text: "沿拖行痕追查下一地點" }, { to: "N17", text: "把血跡交給法醫檢驗" }] },
        { id: "N11", text: `文件顯示倉庫與 Blackfriars 的私人會所都由同一間空殼公司承租，董事名單裡藏著 Lionel 的假名。`, choices: [{ to: "N16", text: "搜索私人會所" }, { to: "N17", text: "追查空殼公司出資者" }, { to: "N18", text: "整合帳冊與租用資料" }] },
        { id: "N12", text: `河岸工人提到，一名受驚的年輕男子曾被帶上一艘小船，後來又有人花錢要求大家忘記此事。`, choices: [{ to: "N17", text: "追查封口者" }, { to: "N18", text: "比對船隻與帳冊時間" }, { to: "N19", text: "尋找船主" }] },
        { id: "N13", text: `Jack 與 Clara 在河岸看見 Lionel 與 Whitmore 夫人密談。Lionel 把一把小鑰匙交給她。`, choices: [{ to: "N18", text: "跟蹤 Lionel" }, { to: "N19", text: "跟蹤 Whitmore 夫人" }, { to: "N20", text: "設法複製那把鑰匙" }] },
        { id: "N14", text: `Clara 查到 Edwin 的姊姊 Eleanor Mercer 曾任職於慈善基金會，近期突然辭職並消失。`, choices: [{ to: "N19", text: "尋找 Eleanor" }, { to: "N20", text: "調查她離職原因" }, { to: "N21", text: "利用基金會人脈引她現身" }] },
        { id: "N15", text: `法律文件揭露基金會、航運公司與海外空殼帳戶之間的洗錢路徑。Edwin 可能碰到了整套機器的核心。`, choices: [{ to: "N20", text: "潛入基金會地下室" }, { to: "N21", text: "設局逼 Lionel 露出破綻" }, { to: "N22", text: "先把證據交給報社" }] },
        { id: "N16", text: `地下室鐵門後，Edwin 仍活著。他受傷虛弱，卻說帳本還沒全部落入敵人手中。`, choices: [{ to: "N23", text: "先護送 Edwin 到安全屋" }, { to: "N24", text: "立刻追問另一半帳本下落" }, { to: "N25", text: "分頭行動追捕守衛" }] },
        { id: "N17", text: `血跡檢驗證實 Edwin 曾在倉庫遇襲，但不足以致命。有人製造了他已死的假象。`, choices: [{ to: "N24", text: "嘗試立刻逮捕嫌犯" }, { to: "N25", text: "先分散保存證據" }] },
        { id: "N18", text: `所有紀錄拼成完整犯罪鏈：慈善基金、銀行、航運公司與議員共同轉移鉅款。`, choices: [{ to: "N25", text: "公開部分證據" }, { to: "N23", text: "優先保護證人" }, { to: "N24", text: "尋找帳冊正本" }] },
        { id: "N19", text: `Eleanor 終於現身。她交出部分帳頁，並說 Whitmore 夫人可能不是敵人，而是在暗中拖延真正的主使者。`, choices: [{ to: "N23", text: "保護 Eleanor" }, { to: "N24", text: "依線索找帳本正本" }, { to: "N25", text: "利用她在晚宴設局" }] },
        { id: "N20", text: `鑰匙打開暗櫃，裡面有帳冊副本、往來信和一份足以致命的名單。`, choices: [{ to: "N24", text: "尋找正本" }, { to: "N25", text: "把副本分散保存" }] },
        { id: "N21", text: `基金會晚宴上，Lionel 在壓力下承認自己只是代人行事。會場氣氛瞬間凝固。`, choices: [{ to: "N26", text: "當眾揭露證據" }, { to: "N30", text: "讓 Eleanor 出面作證" }] },
        { id: "N22", text: `報社準備在清晨刊出醜聞。編輯提醒：一旦印出去，就再也收不回來。`, choices: [{ to: "N28", text: "立刻印刷特刊" }, { to: "N29", text: "先保護證人再曝光" }] },
        { id: "N23", text: `Edwin 與 Eleanor 被安置到安全屋。你們保住人命，但也給了主使者最後一次逃亡機會。`, choices: [{ to: "N27", text: "清晨前公開所有證據" }, { to: "N30", text: "先抓真正主使者" }] },
        { id: "N24", text: `你們找到帳冊正本、議員署名文件與完整名單。這是能讓整個陰謀崩塌的核心證據。`, choices: [{ to: "N26", text: "帶正本前往警局" }, { to: "N29", text: "先做副本再藏正本" }, { to: "N30", text: "用正本引主使者現身" }] },
        { id: "N25", text: `你們把供詞、密件與副本分散送出。真相第一次不再被任何單一人掌控。`, choices: [{ to: "N27", text: "同步曝光" }, { to: "N28", text: "等待對方犯錯" }, { to: "N29", text: "確保真相穩定公開" }] },
        { id: "N26", text: `結局：Jack 與 Clara 成功救出 Edwin，並保住完整帳冊。基金會與銀行高層遭到拘捕。`, choices: [] },
        { id: "N27", text: `結局：醜聞公開，倫敦政商界震動，但案件變成漫長權力鬥爭。`, choices: [] },
        { id: "N28", text: `結局：Lionel Ashe 逃往歐洲大陸，案件告破大半，但陰影仍未散去。`, choices: [] },
        { id: "N29", text: `結局：你們保住人命與大部分證據，但少數核心人物逃過審判。`, choices: [] },
        { id: "N30", text: `結局：Clara 說服 Eleanor 出庭，整個陰謀徹底崩解。Clara 也成為倫敦最敏銳的調查者之一。`, choices: [] }
      ]
    };

    const storyVampire = {
      title: "A Very Polite Vampire",
      subtitle: "第三人稱敘述 · 以吸血鬼 Victor 的行動作為選擇",
      startNode: "V1",
      endNodes: ["V26", "V27", "V28", "V29", "V30"],
      layers: [["V1"], ["V2", "V3", "V4"], ["V5", "V6", "V7", "V8", "V9"], ["V10", "V11", "V12", "V13", "V14", "V15"], ["V16", "V17", "V18", "V19", "V20"], ["V21", "V22", "V23", "V24", "V25"], ["V26", "V27", "V28", "V29", "V30"]],
      nodes: [
        { id: "V1", text: `小鎮的夜晚靜得過分。新搬來的吸血鬼 Victor 站在廚房中央，看著空空如也的櫃子。他並不是一定要血——至少他自己是這樣說服自己的。番茄汁，或者任何紅色飲料，都可以暫時替代。

隔壁住著一位19歲的女孩 Mary。她看起來友善、正常，而且顯然擁有一個有存貨的廚房。`, choices: [{ to: "V2", text: "讓 Victor 直接去敲 Mary 的門，禮貌地借番茄汁" }, { to: "V3", text: "讓 Victor 先觀察 Mary 的生活作息，確保自己不會嚇到她" }, { to: "V4", text: "讓 Victor 先練習人類的對話方式，再決定怎麼開口" }] },
        { id: "V2", text: `Victor 站在 Mary 的門前，確認自己的獠牙沒有露出，然後敲門。

Mary 打開門，看著他蒼白的臉與刻意擠出的微笑，略微停頓了一下。

「嗨，我是新鄰居，可以借一點番茄汁嗎？」Victor 說。

Mary 眨了眨眼：「現在是晚上九點。」`, choices: [{ to: "V5", text: "讓 Victor 嘗試用『只是夜間作息』來合理解釋自己的行為" }, { to: "V6", text: "讓 Victor 假裝自己是夜班工作者" }] },
        { id: "V3", text: `Victor 躲在窗簾後觀察 Mary。他發現她白天活動、晚上休息，作息規律得令人羨慕。不幸的是，Mary 很快就注意到對面窗簾後有個奇怪的影子，並朝他揮手。`, choices: [{ to: "V6", text: "讓 Victor 立刻尷尬地揮手打招呼" }, { to: "V7", text: "讓 Victor 假裝自己只是在看星星" }] },
        { id: "V4", text: `Victor 對著鏡子練習說話，但很快發現鏡子裡沒有任何東西。

他停了一下，點點頭：「對，我忘了這點。」`, choices: [{ to: "V7", text: "讓 Victor 放棄練習，直接去找 Mary" }, { to: "V8", text: "讓 Victor 繼續準備一段更安全的說詞" }] },
        { id: "V5", text: `Victor 試著解釋自己的作息問題。Mary 聽完後點點頭：「所以你只是晚上比較有精神？」Victor 非常認真地點頭。Mary 笑了笑：「那你應該很適合幫我搬東西。」`, choices: [{ to: "V10", text: "讓 Victor 答應幫忙，換取建立關係的機會" }, { to: "V11", text: "讓 Victor 試著把話題拉回『番茄汁』" }] },
        { id: "V6", text: `Victor 說自己是夜班工作者。Mary 顯得稍微放鬆了一點。「那你應該很累。」她說。Victor 點頭，但內心其實在想他已經幾百年沒睡過覺。`, choices: [{ to: "V10", text: "讓 Victor 順勢聊天" }, { to: "V12", text: "讓 Victor 再次嘗試借東西" }] },
        { id: "V7", text: `Mary 覺得這位新鄰居有點奇怪，但並沒有感到害怕。她甚至露出一點好奇的表情。`, choices: [{ to: "V12", text: "讓 Victor 直接提出借東西的請求" }, { to: "V13", text: "讓 Victor 先嘗試建立信任與聊天" }] },
        { id: "V8", text: `Victor 準備了一段聽起來非常『人類』的台詞，但實際講出來時有點像在背稿。`, choices: [{ to: "V13", text: "讓 Victor 改用自然方式" }, { to: "V12", text: "讓 Victor 照稿念" }] },
        { id: "V9", text: `Victor 一度考慮寫紙條，但他意識到這只會讓自己顯得更可疑。`, choices: [{ to: "V12", text: "還是讓 Victor 當面開口借東西" }, { to: "V13", text: "讓 Victor 先聊幾句再進入正題" }] },
        { id: "V10", text: `Victor 搬東西時表現出過於誇張的力量。Mary 看著他單手抬起沉重箱子，眉毛慢慢挑了起來。`, choices: [{ to: "V14", text: "讓 Victor 嘗試解釋自己只是平常有在訓練" }, { to: "V15", text: "讓 Victor 趕快轉移話題，不讓 Mary 繼續往下想" }] },
        { id: "V11", text: `Victor 試圖把話題拉回番茄汁，卻越說越像在隱瞞什麼。`, choices: [{ to: "V15", text: "讓 Victor 換個輕鬆話題" }, { to: "V16", text: "讓 Victor 放棄這次社交，先撤回自己家裡" }] },
        { id: "V12", text: `Mary 最後真的遞給 Victor 一瓶番茄汁。Victor 接過瓶子時，神情認真得像收到某種正式援助。`, choices: [{ to: "V17", text: "讓 Victor 真誠地向 Mary 表達感謝" }, { to: "V18", text: "讓 Victor 趁機再借點別的東西" }] },
        { id: "V13", text: `兩人開始聊起小鎮、搬家與夜晚的安靜。Mary 漸漸覺得 Victor 雖然怪，卻不是討厭的那種怪。`, choices: [{ to: "V17", text: "讓 Victor 繼續順著這份輕鬆氣氛聊下去" }, { to: "V18", text: "讓 Victor 把話題慢慢轉回借東西" }] },
        { id: "V14", text: `Mary 開始懷疑 Victor 的說詞，但她還沒有完全失去耐心。`, choices: [{ to: "V19", text: "讓 Victor 嘗試用更自然的方式挽回局面" }] },
        { id: "V15", text: `Victor 的轉移話題略顯生硬，Mary 雖然沒有拆穿他，卻明顯記住了那一瞬間的不對勁。`, choices: [{ to: "V19", text: "讓 Victor 趁局面還沒壞到底之前試著挽回" }] },
        { id: "V16", text: `Victor 決定先撤退回家。他至少借到了東西，雖然整場互動留下不少尷尬。`, choices: [{ to: "V26", text: "讓這次拜訪以普通但安全的方式收尾" }] },
        { id: "V17", text: `Mary 開始覺得 Victor 其實挺有趣，只是和一般人相比，某些習慣實在太奇怪了一點。`, choices: [{ to: "V20", text: "讓 Victor 慢慢建立鄰居關係" }] },
        { id: "V18", text: `Victor 再借更多東西的舉動讓 Mary 的好奇心開始往懷疑滑動。番茄汁可以理解，接著又問有沒有番茄醬、紅色果醬，甚至問了「你家有沒有比較厚的窗簾」，這就很難不讓人多想。`, choices: [{ to: "V21", text: "讓 Victor 正面面對 Mary 的懷疑" }, { to: "V24", text: "讓 Victor 繼續亂補可疑理由，把疑點堆成災難" }] },
        { id: "V19", text: `氣氛變得微妙。Victor 必須把自己的怪控制在『有趣』而不是『需要報警』的範圍內。`, choices: [{ to: "V21", text: "讓 Victor 繼續面對 Mary 的疑問" }, { to: "V24", text: "讓 Victor 再多說幾句自以為聰明的解釋" }, { to: "V25", text: "讓 Victor 用自嘲和笨拙幽默化解尷尬" }] },
        { id: "V20", text: `Victor 與 Mary 逐漸建立起一種帶著奇妙節奏的鄰居友誼。`, choices: [{ to: "V26", text: "讓這段關係以溫和方式收束成好開端" }] },
        { id: "V21", text: `Mary 看著 Victor，像是終於把前面所有細節串了起來。Victor 知道，自己再往前一步，可能就是坦白、逃跑，或徹底出糗。`, choices: [{ to: "V22", text: "讓 Victor 主動坦白自己是吸血鬼" }, { to: "V23", text: "讓 Victor 在局面失控前先撤回家裡" }, { to: "V25", text: "讓 Victor 用誠懇又笨拙的幽默化解張力" }] },
        { id: "V22", text: `Victor 最後選擇坦白。他盡可能平靜而禮貌地說出真相，並補上一句自己其實更喜歡番茄汁。`, choices: [{ to: "V27", text: "看看 Mary 是否能接受這件荒謬卻無害的真相" }] },
        { id: "V23", text: `Victor 選擇撤退。他回到自己屋裡，靠著門板站了幾秒，懷疑自己剛剛是不是把鄰里關係搞砸了。`, choices: [{ to: "V28", text: "讓這次社交嘗試以失敗收場" }] },
        { id: "V24", text: `一連串誤會疊加後，事情開始往滑稽災難方向發展。Mary 的表情已經介於困惑、警覺與想笑之間。`, choices: [{ to: "V29", text: "讓 Victor 繼續硬撐那些越來越站不住腳的藉口" }] },
        { id: "V25", text: `Victor 與 Mary 的對話在尷尬與笑點之間反覆搖擺，竟慢慢走向一種奇妙的和諧。`, choices: [{ to: "V30", text: "讓 Victor 把這場古怪互動收成 happy ending" }] },
        { id: "V26", text: `結局：Victor 沒有暴露真正身分，也成功在 Mary 心裡留下還算不錯的鄰居印象。`, choices: [] },
        { id: "V27", text: `結局：Mary 花了一點時間消化新鄰居是吸血鬼這件事，但最後接受了 Victor。前提是他以後要先敲門，不要深夜站在窗外。`, choices: [] },
        { id: "V28", text: `結局：Victor 的第一次鄰里交流以社交失敗告終。Mary 之後看見他時，眼神裡多了一點觀察距離。`, choices: [] },
        { id: "V29", text: `結局：誤會一路失控，從奇怪作息、誇張力氣到無法自圓其說的藉口，全都疊成小型災難。`, choices: [] },
        { id: "V30", text: `結局：Mary 一邊笑 Victor 的笨拙，一邊把番茄汁塞給他。Victor 第一次覺得，搬來這個小鎮也許真的是不錯的決定。`, choices: [] }
      ]
    };

    const stories = { detective: storyDetective, vampire: storyVampire };

    function validateStoryData(storyData) {
      const errors = [];
      const warnings = [];
      const nodeIds = new Set();
      const layeredIds = new Set();
      if (!storyData || typeof storyData !== "object") return { errors: ["storyData must be an object"], warnings };
      for (const node of storyData.nodes || []) {
        if (nodeIds.has(node.id)) errors.push(`Duplicate node id: ${node.id}`);
        nodeIds.add(node.id);
        if (!Array.isArray(node.choices)) errors.push(`Node ${node.id} choices must be an array`);
      }
      if (!nodeIds.has(storyData.startNode)) errors.push(`Missing startNode: ${storyData.startNode}`);
      for (const endNode of storyData.endNodes || []) if (!nodeIds.has(endNode)) errors.push(`Missing endNode: ${endNode}`);
      for (const layer of storyData.layers || []) for (const nodeId of layer) {
        layeredIds.add(nodeId);
        if (!nodeIds.has(nodeId)) errors.push(`Layer references missing node: ${nodeId}`);
      }
      for (const node of storyData.nodes || []) {
        if (!layeredIds.has(node.id)) warnings.push(`Node ${node.id} is not in layers`);
        for (const choice of node.choices || []) if (!nodeIds.has(choice.to)) errors.push(`Node ${node.id} links to missing node: ${choice.to}`);
      }
      return { errors, warnings };
    }

    function runSmokeTests(storyData) {
      const nodeMap = Object.fromEntries(storyData.nodes.map((node) => [node.id, node]));
      return [
        { name: "can find start node", pass: Boolean(nodeMap[storyData.startNode]) },
        { name: "all end nodes exist", pass: storyData.endNodes.every((id) => Boolean(nodeMap[id])) },
        { name: "has about 30 nodes", pass: storyData.nodes.length >= 25 },
        { name: "all choices target valid nodes", pass: storyData.nodes.every((node) => node.choices.every((choice) => Boolean(nodeMap[choice.to]))) },
        { name: "end nodes have no choices", pass: storyData.endNodes.every((id) => nodeMap[id].choices.length === 0) }
      ];
    }

    function createStoryEngine() {
      const state = { storyKey: "detective", storyData: stories.detective, currentNodeId: stories.detective.startNode, history: [stories.detective.startNode], graphPositions: {} };
      const els = {
        storySelector: document.getElementById("storySelector"), storyTitle: document.getElementById("storyTitle"), storySubtitle: document.getElementById("storySubtitle"), storyText: document.getElementById("storyText"), choicesBox: document.getElementById("choicesBox"), endText: document.getElementById("endText"), pathText: document.getElementById("pathText"), restartBtn: document.getElementById("restartBtn"), backBtn: document.getElementById("backBtn"), graphCanvas: document.getElementById("graphCanvas"), statusBox: document.getElementById("statusBox")
      };
      const graphCtx = els.graphCanvas.getContext("2d");

      function nodeMap() { return Object.fromEntries(state.storyData.nodes.map((node) => [node.id, node])); }
      function setStory(storyKey) { state.storyKey = storyKey; state.storyData = stories[storyKey]; state.currentNodeId = state.storyData.startNode; state.history = [state.storyData.startNode]; render(); }
      function goToNode(nodeId) { if (!nodeMap()[nodeId]) return; state.currentNodeId = nodeId; state.history.push(nodeId); render(); }
      function restart() { state.currentNodeId = state.storyData.startNode; state.history = [state.storyData.startNode]; render(); }
      function goBack() { if (state.history.length <= 1) return; state.history.pop(); state.currentNodeId = state.history[state.history.length - 1]; render(); }

      function drawGraph() {
        const { storyData, currentNodeId, history, graphPositions } = state;
        graphCtx.clearRect(0, 0, els.graphCanvas.width, els.graphCanvas.height);
        const left = 90, right = els.graphCanvas.width - 90, top = 60, bottom = els.graphCanvas.height - 60;
        const layerGap = storyData.layers.length <= 1 ? 0 : (right - left) / (storyData.layers.length - 1);
        Object.keys(graphPositions).forEach((key) => delete graphPositions[key]);
        storyData.layers.forEach((layer, layerIndex) => {
          const x = left + layerGap * layerIndex;
          const verticalGap = layer.length <= 1 ? 0 : (bottom - top) / (layer.length - 1);
          layer.forEach((nodeId, index) => graphPositions[nodeId] = { x, y: layer.length <= 1 ? (top + bottom) / 2 : top + verticalGap * index });
        });
        storyData.nodes.forEach((node) => {
          const from = graphPositions[node.id];
          if (!from) return;
          node.choices.forEach((choice) => {
            const to = graphPositions[choice.to];
            if (!to) return;
            const angle = Math.atan2(to.y - from.y, to.x - from.x), r = 20;
            graphCtx.beginPath();
            graphCtx.moveTo(from.x + Math.cos(angle) * r, from.y + Math.sin(angle) * r);
            graphCtx.lineTo(to.x - Math.cos(angle) * r, to.y - Math.sin(angle) * r);
            graphCtx.strokeStyle = "#475569";
            graphCtx.lineWidth = 1.2;
            graphCtx.stroke();
          });
        });
        storyData.nodes.forEach((node) => {
          const pos = graphPositions[node.id];
          if (!pos) return;
          const isCurrent = node.id === currentNodeId;
          const isEnd = storyData.endNodes.includes(node.id);
          const isVisited = history.includes(node.id);
          graphCtx.beginPath();
          graphCtx.arc(pos.x, pos.y, 20, 0, Math.PI * 2);
          graphCtx.fillStyle = isCurrent ? "#fde68a" : isEnd ? "#fecaca" : isVisited ? "#86efac" : "#bfdbfe";
          graphCtx.fill();
          graphCtx.strokeStyle = "#1e293b";
          graphCtx.lineWidth = isCurrent ? 3 : 1.5;
          graphCtx.stroke();
          graphCtx.fillStyle = "#0f172a";
          graphCtx.font = "12px Arial";
          graphCtx.textAlign = "center";
          graphCtx.textBaseline = "middle";
          graphCtx.fillText(node.id, pos.x, pos.y);
        });
      }

      function renderStatus() {
        const validation = validateStoryData(state.storyData);
        const tests = runSmokeTests(state.storyData);
        const passed = tests.filter((test) => test.pass).length;
        els.statusBox.className = validation.errors.length === 0 && passed === tests.length ? "status ok" : "status error";
        els.statusBox.textContent = [`Validation errors: ${validation.errors.length}`, `Validation warnings: ${validation.warnings.length}`, `Smoke tests passed: ${passed}/${tests.length}`, "", ...validation.errors.map((e) => `ERROR: ${e}`), ...validation.warnings.map((w) => `WARN: ${w}`), "", ...tests.map((t) => `[${t.pass ? "PASS" : "FAIL"}] ${t.name}`)].join("\n");
      }

      function render() {
        const map = nodeMap();
        const node = map[state.currentNodeId];
        els.storySelector.value = state.storyKey;
        els.storyTitle.textContent = state.storyData.title;
        els.storySubtitle.textContent = state.storyData.subtitle;
        els.storyText.textContent = node ? node.text : `Missing node ${state.currentNodeId}`;
        els.choicesBox.innerHTML = "";
        els.endText.textContent = "";
        if (node && state.storyData.endNodes.includes(node.id)) els.endText.textContent = "故事結束";
        else if (node) node.choices.forEach((choice) => { const btn = document.createElement("button"); btn.textContent = choice.text; btn.onclick = () => goToNode(choice.to); els.choicesBox.appendChild(btn); });
        els.pathText.textContent = "路徑：" + state.history.join(" → ");
        els.backBtn.disabled = state.history.length <= 1;
        els.backBtn.style.opacity = state.history.length <= 1 ? "0.5" : "1";
        renderStatus();
        drawGraph();
      }

      Object.entries(stories).forEach(([key, story]) => { const option = document.createElement("option"); option.value = key; option.textContent = story.title; els.storySelector.appendChild(option); });
      els.storySelector.onchange = (event) => setStory(event.target.value);
      els.restartBtn.onclick = restart;
      els.backBtn.onclick = goBack;
      return { render, setStory };
    }

    const engine = createStoryEngine();
    engine.render();
  </script>
</body>
